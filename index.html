<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vale Futebol Manager 2026 - Premium</title>

  <link rel="stylesheet" href="./styles.css?v=v1.48.0_match_engine_realism" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0EA5E9" />

<link rel="stylesheet" href="ui/mobile-ui.css">
</head>
<body>

<div id="intro-screen" style="position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;">
  <video id="intro-video" style="max-width:100%;max-height:100%;object-fit:contain;" autoplay muted playsinline>
    <source src="assets/video/intro.mp4" type="video/mp4">
  </video>
  <button id="skip-intro" style="position:absolute;bottom:30px;padding:12px 22px;font-size:16px;border-radius:10px;border:none;background:#16a34a;color:white;">Pular</button>
</div>
<script>
(function(){
  const video=document.getElementById("intro-video");
  const screen=document.getElementById("intro-screen");
  const skip=document.getElementById("skip-intro");
  function closeIntro(){ if(screen) screen.style.display="none"; }
  if(video) video.addEventListener("ended",closeIntro);
  if(skip) skip.addEventListener("click",closeIntro);
})();
</script>


<div id="main-menu" style="position:fixed;inset:0;background:#0b1220;color:white;z-index:9998;display:flex;align-items:center;justify-content:center;flex-direction:column;">
<h1 style="font-size:32px;margin-bottom:20px;">Vale Futebol Manager 2026</h1>
<button onclick="startGame()">Continuar Carreira</button>
<button onclick="startGame()">Nova Carreira</button>
<button onclick="closeMenu()">Entrar</button>
</div>
<script>
function startGame(){document.getElementById("main-menu").style.display="none";}
function closeMenu(){document.getElementById("main-menu").style.display="none";}
</script>

  <!-- Splash -->
  <div class="splash" id="splash">
    <div class="splash-logo">
      <img src="./assets/images/vale_games_logo.png" alt="Vale Games" />
    </div>
  </div>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo-badge">VFM</div>
        <div class="brand-text">
          <div class="brand-title">Vale Futebol Manager 2026</div>
          <div class="brand-subtitle">Carreira • Dados • Admin • Full Build</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" type="button" onclick="location.hash='#/home'">Início</button>
      </div>
    </header>

    <main class="main">
      <div id="view" class="view"></div>
    </main>

    <footer class="footer">
      <span>© Vale Games</span>
      <span class="dot">•</span>
      <span>Offline • LocalStorage</span>
    </footer>

    <!-- Badge fixo (build + data dos dados) -->
    <div id="buildBadge" class="build-badge" aria-label="Build"></div>
  </div>

  <!-- App principal -->
  <!-- Cache-bust: sempre atualize o parâmetro v em cada build -->
  <script src="./app.js?v=v1.48.0_match_engine_realism" defer></script>

  <!-- Guardas de UX (não altera lógica do jogo) -->
  <script>
    (function(){
      // remove splash em até 2s sempre
      setTimeout(function(){
        var splash = document.getElementById('splash');
        if (splash) { splash.classList.add('hidden'); splash.style.display='none'; }
      }, 2000);

      // Se depois de 5s ainda não renderizou nada, mostra uma tela de fallback
      setTimeout(function(){
        var viewEl = document.getElementById('view');
        if (viewEl && !viewEl.innerHTML.trim()){
          viewEl.innerHTML =
            '<div class="card">' +
              '<div class="card-header">' +
                '<div><div class="card-title">Carregando...</div><div class="card-subtitle">O jogo está demorando para iniciar (GitHub Pages)</div></div>' +
                '<span class="badge">VFM</span>' +
              '</div>' +
              '<div class="card-body">' +
                '<div class="notice">Se ficar preso aqui, recarregue a página (Ctrl+F5).</div>' +
                '<div class="sep"></div>' +
                '<button class="btn btn-primary" type="button" onclick="location.reload()">Recarregar</button>' +
              '</div>' +
            '</div>';
        }
      }, 5000);
    })();
  </script>
  <script>
    (function(){
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js?v=v1.48.0_match_engine_realism').catch(function(){});
      
      // força recarregar quando houver nova versão do service worker
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
}
    })();
  </script>
</body>
</html>
